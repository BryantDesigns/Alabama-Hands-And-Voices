ehdiSidebarBody: >-
    The EHDI-PALS directory has information about audiology services for children
    from birth to age five. Facilities report pediatric equipment and expertise,
    licensed audiologists, available languages, payment options, and appointment
    availability.
ehdiSidebarUrl: http://www.ehdi-pals.org/
