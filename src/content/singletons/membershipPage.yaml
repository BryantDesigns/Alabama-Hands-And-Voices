heroHeading: Help Us Help You!
heroText: >-
    Become a member of Alabama Hands & Voices and join a community dedicated to
    supporting families of children who are deaf or hard of hearing. Annual
    membership is $25 for parents, students, and DHH adults; $40 for
    professionals; and $50 for organizations.
