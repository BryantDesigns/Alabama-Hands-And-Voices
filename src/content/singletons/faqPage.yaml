heading: Frequently Asked Questions
introCopy: Find answers to common questions about hearing loss, resources, and support for your family.
faqEntries:
    - question: My child was referred for additional hearing tests after the newborn screening. What does this mean?
      answer: >-
          A referral after newborn screening does not necessarily mean your child
          has permanent hearing loss. Follow-up testing is routine. Contact your
          audiologist or visit EHDI-PALS (http://www.ehdi-pals.org/) to find a
          provider near you.
      resourceLinks:
          - label: Find a pediatric audiologist with EHDI-PALS
            url: http://www.ehdi-pals.org/
          - label: Alabama Newborn Hearing Screening
            url: https://www.alabamapublichealth.gov/newbornscreening/newborn-hearing-screening.html
          - label: NCHAM state resources
            url: http://www.infanthearing.org/states/
    - question: My child is deaf or hard of hearing. Now what?
      answer: >-
          Start by connecting with Alabama Hands & Voices. We can help you navigate
          next steps, find early intervention services, and connect with other
          families. Download our Pathways guide (/assets/documents/Pathways.pdf)
          for a roadmap of what to expect.
      resourceLinks:
          - label: Alabama Early Intervention System
            url: https://www.rehab.alabama.gov/services/ei
          - label: Download ADRS Pathways for Families
            url: /assets/documents/Pathways.pdf
          - label: Alabama Special Education Services
            url: https://www.alabamaachieves.org/special-education/
          - label: Parent's Guide to D/HH Early Intervention
            url: https://www.handsandvoices.org/resources/pubs/Final_8-30-2017.pdf
    - question: Will we seek technology to enhance our child's hearing?
      answer: >-
          Technology decisions are personal and depend on your child's hearing loss,
          your family's communication goals, and medical recommendations. Options
          include hearing aids and cochlear implants. Talk with your audiologist and
          connect with other families who have faced similar decisions.
      resourceLinks:
          - label: Hearing aids
            url: https://www.nidcd.nih.gov/health/hearing-aids
          - label: Cochlear implants
            url: http://www.acialliance.org/page/CochlearImplant
          - label: American Sign Language
            url: https://www.nad.org/resources/american-sign-language/
          - label: Alabama Association of the Deaf
            url: https://deafalabama.org/home/
          - label: Auburn Speech and Hearing Clinic
            url: https://cla.auburn.edu/speechandhearingclinic/
          - label: Children's Rehabilitation Services
            url: https://www.rehab.alabama.gov/services/crs
          - label: All for Children
            url: https://all-forchildren.com/
          - label: East Alabama ENT
            url: https://www.eaent.com/
          - label: Children's of Alabama HEAR Center
            url: https://www.childrensal.org/hear-center
          - label: Huntsville Hospital pediatric audiology
            url: http://www.hhwomenandchildren.org/pediatric-audiology
          - label: University of South Alabama Speech and Hearing Center
            url: https://www.southalabama.edu/colleges/alliedhealth/speechandhearing/clinic.html
    - question: How will we communicate with our child?
      answer: >-
          There is no single right answer. Families choose spoken language, sign
          language, or a combination based on their child's needs and family
          preferences. Explore the Communication Considerations A-Z resource at
          Hands & Voices national for guidance.
      resourceLinks:
          - label: Hands & Voices Communication Considerations A-Z
            url: http://www.handsandvoices.org/comcon/index.html
    - question: How do I start building my child's team?
      answer: >-
          Your child's team may include audiologists, speech-language pathologists,
          educators, and family advocates. Contact us at alabamahinfo@gmail.com or
          connect through our Guide By Your Side program (/programs/gbys) to get
          started.
      resourceLinks:
          - label: Email Alabama Hands & Voices
            url: mailto:alabamahinfo@gmail.com
          - label: Request a Guide By Your Side
            url: /programs/gbys
