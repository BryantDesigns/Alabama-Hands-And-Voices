whoWeAreQuote: >-
    There is room in the community of deafness for an organization like Hands &
    Voices. Parents connecting to other parents provides an element of
    credibility; there is a level of knowing and feeling that only a parent
    experiences. Parents, especially parents of babies newly identified with
    deafness or hearing loss, need a way to connect without being wary of a
    sponsoring agenda from a service provider.
whoWeAreQuoteAttribution: Leeanne Seaver, Hands & Voices
values:
    - value: We all want the best for our children who are deaf or hard of hearing.
    - value: We deserve respect and honor for our role as parents and families, and we require a beneficial educational experience for our children.
    - value: We need information from a wide variety of sources.
    - value: We want to know about opportunities and resources.
    - value: We need training and support to become effective advocates for our children.
    - value: We are stronger united by our common interests than divided by differing communication choices.
    - value: We lend our organized support to efforts that promote our common interests — there is strength in numbers.
membershipCtaText: >-
    Whether you are joining for the first time or renewing, download the
    membership form or visit our online membership page. Your contribution helps
    us develop and share unbiased resources for families. Scholarships are
    available for parents upon request.
