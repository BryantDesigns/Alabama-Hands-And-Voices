heroTagline: Deaf & Hard of Hearing Role Models & Mentors
committeeCardBody: >-
  D/HH Committee Members are deaf and hard of hearing adults who give back by
  serving as role models and mentors to the next generation of children and
  families.
benefits:
  - benefit: Share their personal experience as a DHH adult
  - benefit: Provide inspiration and guidance to children and families
  - benefit: Connect families with DHH community resources
  - benefit: Support communication and language development
  - benefit: Help families understand educational options
