learnMore:
    heading: Learn More About Us
    featureBlocks:
        - heading: Guide By Your Side
          body: >-
              Connect with a trained Parent Guide who has a child who is deaf or hard
              of hearing. Our GBYS program provides one-on-one support tailored to
              your family's unique journey — completely free of charge.
          image: /images/aboutUsWhoWeAreFamily.jpg
          imageAlt: GBYS family support
        - heading: Educational Advocacy
          body: >-
              ASTra (Advocacy Support and Training) helps families navigate the
              special education system. We can help you prepare for IEP meetings,
              understand your rights, and build an effective educational team for your
              child.
          image: /images/aboutUsWhoWeAreTrail.jpeg
          imageAlt: Educational advocacy support
